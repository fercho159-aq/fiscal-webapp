server {
    listen 80;
    listen [::]:80;
    server_name fiscal.yaakob.com;

    # Certbot challenge
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name fiscal.yaakob.com;

    # SSL certs gestionados por Certbot (rellenado por setup-nginx.sh)
    ssl_certificate /etc/letsencrypt/live/fiscal.yaakob.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/fiscal.yaakob.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    # Uploads PDFs hasta 25MB
    client_max_body_size 25M;
    client_body_timeout 120s;

    # Logs
    access_log /var/log/nginx/fiscal-access.log;
    error_log /var/log/nginx/fiscal-error.log;

    location / {
        proxy_pass http://127.0.0.1:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_cache_bypass $http_upgrade;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_send_timeout 300s;
    }

    # Health check sin TLS para monitoreo interno (opcional)
    location = /api/health {
        proxy_pass http://127.0.0.1:3010;
        access_log off;
    }
}
